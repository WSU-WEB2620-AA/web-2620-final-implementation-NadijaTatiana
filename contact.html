<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nadija Tatiana | Contact</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script src="js/main.js" defer></script>
  </head>
  <body>
    <div class="page-shell contact-page-shell">
      <header class="site-header">
        <div class="topbar">
          <a class="brand" href="index.html">Nadija Tatiana</a>

          <nav class="desktop-links" aria-label="Primary">
            <a href="index.html">Home</a>
            <a href="about.html">About Me</a>
            <a href="acting.html">Acting</a>
            <a href="modeling.html">Modeling</a>
            <a href="contact.html" class="active">Contact</a>
          </nav>

          <button class="menu-toggle" aria-label="Open menu" aria-expanded="false">
            <span class="hamburger"></span>
          </button>
        </div>

        <nav class="mobile-menu" aria-label="Mobile">
          <a href="index.html">Home</a>
          <a href="about.html">About Me</a>
          <a href="acting.html">Acting</a>
          <a href="modeling.html">Modeling</a>
          <a href="contact.html" class="active">Contact</a>
        </nav>
      </header>
      <main class="page-padding contact-page-main">
        <div class="contact-content">
          <h1 class="page-title">Contact Me</h1>
          <p class="page-subtitle contact-subtitle">For inquiries, collaboration, booking opportunities, or creative collaborations, please get in touch below.</p>
          <div class="form-wrap">
            <form class="contact-form" id="contactForm" novalidate>
              <label for="firstName">First name</label>
              <input id="firstName" name="firstName" type="text" placeholder="Jane" autocomplete="given-name" />
              <label for="lastName">Last name</label>
              <input id="lastName" name="lastName" type="text" placeholder="Smitherton" autocomplete="family-name" />
              <label for="email">Email address</label>
              <input id="email" name="email" type="email" placeholder="email@domain.com" autocomplete="email" inputmode="email" />
              <label for="message">Your message</label>
              <textarea id="message" name="message" placeholder="Enter your question or message" autocomplete="off"></textarea>
              <button class="submit-btn" type="submit">Submit</button>
              <div class="form-message" id="formMessage" aria-live="polite" role="status"></div>
            </form>
          </div>
        </div>
      </main>
      <footer class="site-footer">
        <div class="footer-name">Nadija Tatiana</div>
        <div class="footer-social">
          <a href="https://www.instagram.com/nadijatatiana/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
            <img src="Images/black-instagram-icon.png" alt="Instagram" />
          </a>
          <a href="https://www.tiktok.com/@nadijatatiana" target="_blank" rel="noopener noreferrer" aria-label="TikTok">
            <img src="Images/tiktok-simplified-black-icon.png" alt="TikTok" />
          </a>
          <a href="https://www.youtube.com/@nadijatatiana" target="_blank" rel="noopener noreferrer" aria-label="YouTube">
            <img src="Images/youtube-icon.png" alt="YouTube" />
          </a>
        </div>
      </footer>
    </div>
  </body>
</html>
